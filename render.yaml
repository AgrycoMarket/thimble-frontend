services:
  # 1. Base de données PostgreSQL pour Publish
  - type: pserv
    name: thimble-postgres
    runtime: docker
    dockerfilePath: ./postgres.Dockerfile
    env: docker
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  # 2. Redis pour les sessions (optionnel mais recommandé)
  - type: pserv
    name: thimble-redis
    runtime: image
    image:
      url: redis:6-alpine
    disk:
      name: redis-data
      mountPath: /data
      sizeGB: 1

  # 3. Publish API (stockage des projets)
  - type: web
    name: thimble-publish
    runtime: node
    buildCommand: npm install && npm run knex
    startCommand: npm start
    repo: https://github.com/TON_USERNAME/thimble-publish.git
    branch: master
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: thimble-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 2016
      - key: PUBLIC_PROJECTS
        value: "true"

  # 4. ID Server (authentification OAuth)
  - type: web
    name: thimble-id
    runtime: node
    buildCommand: npm install && node scripts/create-tables.js
    startCommand: npm start
    repo: https://github.com/TON_USERNAME/thimble-id.git
    branch: master
    envVars:
      - key: PORT
        value: 1234
      - key: NODE_ENV
        value: development
      - key: LOGIN_URI
        value: https://thimble-login.onrender.com
      - key: OAUTH_CLIENT_ID
        value: test
      - key: OAUTH_CLIENT_SECRET
        value: test
      - key: SECRET_KEY
        generateValue: true

  # 5. Login Server (gestion utilisateurs legacy)
  - type: web
    name: thimble-login
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    repo: https://github.com/TON_USERNAME/thimble-login.git
    branch: master
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: development
      - key: ALLOWED_DOMAINS
        value: "http://localhost:3500,https://thimble-frontend.onrender.com"

  # 6. Thimble Frontend (l'éditeur)
  - type: web
    name: thimble-frontend
    runtime: node
    buildCommand: npm install && npm run env
    startCommand: npm start
    repo: https://github.com/TON_USERNAME/thimble-frontend.git
    branch: master
    envVars:
      - key: PORT
        value: 3500
      - key: NODE_ENV
        value: development
      - key: PUBLISH_HOSTNAME
        value: https://thimble-publish.onrender.com
      - key: ID_HOSTNAME
        value: https://thimble-id.onrender.com
      - key: LOGIN_HOSTNAME
        value: https://thimble-login.onrender.com
      - key: OAUTH_CLIENT_ID
        value: test
      - key: OAUTH_CLIENT_SECRET
        value: test
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
